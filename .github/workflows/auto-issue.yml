name: Auto Issue Bot

on:
  # Open issue when any workflow fails
  workflow_run:
    workflows:
      - "Build and Push Docker Images"
      - "PRism AI Review"
    types:
      - completed

  # Scan for TODO/FIXME/HACK on push to main
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'src/**'

  # Weekly enhancement suggestions
  schedule:
    - cron: '0 9 * * 1'  # Every Monday 9am UTC

permissions:
  contents: read
  issues: write

jobs:
  # ──────────────────────────────────
  # Auto-open issue on workflow failure
  # ──────────────────────────────────
  issue-on-failure:
    name: Open Issue on CI Failure
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'failure' }}
    steps:
      - name: Create failure issue
        uses: actions/github-script@v8
        with:
          script: |
            const run = context.payload.workflow_run;
            const title = `🚨 CI Failure: ${run.name} on ${run.head_branch}`;

            // Check for duplicate open issue
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'ci-failure'
            });
            const duplicate = issues.data.find(i => i.title === title);
            if (duplicate) {
              console.log('Duplicate issue found, skipping.');
              return;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body: [
                '## 🚨 CI Pipeline Failure',
                '',
                `**Workflow:** ${run.name}`,
                `**Branch:** \`${run.head_branch}\``,
                `**Commit:** \`${run.head_sha.slice(0, 7)}\``,
                `**Triggered by:** ${run.triggering_actor?.login || 'unknown'}`,
                `**Run URL:** ${run.html_url}`,
                '',
                '### 🔍 Steps to Fix',
                '1. Click the Run URL above to see the error logs',
                '2. Fix the failing step',
                '3. Push a new commit to re-trigger the pipeline',
                '',
                '---',
                '*Auto-opened by PRism-AI Issue Bot*'
              ].join('\n'),
              labels: ['bug', 'ci-failure', 'auto-issue']
            });

  # ──────────────────────────────────
  # Scan code for TODO / FIXME / HACK comments
  # ──────────────────────────────────
  scan-todos:
    name: Scan TODO/FIXME/HACK → Issues
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Find TODO/FIXME/HACK comments
        id: scan
        run: |
          echo "found=false" >> $GITHUB_OUTPUT
          RESULTS=$(grep -rn --include="*.py" --include="*.ts" --include="*.tsx" --include="*.js" \
            -E "(TODO|FIXME|HACK|XXX|BUG):" \
            backend/ src/ 2>/dev/null | head -30 || true)
          if [ -n "$RESULTS" ]; then
            echo "found=true" >> $GITHUB_OUTPUT
            echo "results<<EOF" >> $GITHUB_OUTPUT
            echo "$RESULTS" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - name: Create TODO issue
        if: steps.scan.outputs.found == 'true'
        uses: actions/github-script@v8
        with:
          script: |
            const results = `${{ steps.scan.outputs.results }}`;
            const sha = context.sha.slice(0, 7);
            const title = `📌 Code Debt: TODO/FIXME items found in ${sha}`;

            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'tech-debt'
            });
            if (existing.data.length > 0) return;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body: [
                '## 📌 Code Debt Detected',
                '',
                `Found TODO/FIXME/HACK comments in commit \`${sha}\`:`,
                '',
                '```',
                results,
                '```',
                '',
                '### 💡 Action Items',
                '- Review each item above',
                '- Create targeted fix PRs',
                '- Remove comment once resolved',
                '',
                '---',
                '*Auto-opened by PRism-AI Issue Bot*'
              ].join('\n'),
              labels: ['tech-debt', 'enhancement', 'auto-issue']
            });

  # ──────────────────────────────────
  # Weekly enhancement issue
  # ──────────────────────────────────
  weekly-enhancement:
    name: Weekly Enhancement Tracker
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'schedule' }}
    steps:
      - name: Create weekly enhancement issue
        uses: actions/github-script@v8
        with:
          script: |
            const date = new Date().toISOString().split('T')[0];
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚀 Weekly Enhancement Tracker — ${date}`,
              body: [
                '## 🚀 Weekly Enhancement & Improvement Tracker',
                '',
                `**Week of:** ${date}`,
                '',
                '### 🎯 Planned Enhancements',
                '- [ ] Review open TODO/FIXME issues',
                '- [ ] Check dependency updates (Dependabot PRs)',
                '- [ ] Review code coverage gaps',
                '- [ ] Update documentation',
                '- [ ] Profile API performance',
                '',
                '### 💡 Feature Ideas',
                '- [ ] <!-- Add feature ideas here -->',
                '',
                '### 🔧 Tech Debt',
                '- [ ] <!-- Add tech debt items here -->',
                '',
                '### 📊 Metrics to Review',
                '- [ ] Docker image sizes',
                '- [ ] CI pipeline duration',
                '- [ ] GitHub Actions usage',
                '',
                '---',
                '*Auto-opened weekly by PRism-AI Issue Bot*'
              ].join('\n'),
              labels: ['enhancement', 'weekly-tracker', 'auto-issue']
            });
