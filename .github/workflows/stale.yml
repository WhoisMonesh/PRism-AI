name: Close Stale Issues & PRs

on:
  schedule:
    # Run daily at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: Mark and Close Stale Items
    runs-on: ubuntu-latest
    
    steps:
      - name: Mark stale issues and pull requests
        uses: actions/stale@v9
        with:
          # Repository token
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          
          # Issue settings
          stale-issue-message: |
            👋 Hey there! This issue has been automatically marked as stale because it hasn't had any activity in the last 60 days.
            
            **What happens next?**
            - If this issue is still relevant, please comment to keep it open.
            - Otherwise, it will be automatically closed in 7 days.
            
            Thank you for your contributions! 🙏
          close-issue-message: |
            🤖 This issue has been automatically closed due to inactivity.
            
            If you believe this issue should be reopened, please feel free to do so with a comment explaining why.
            
            Thank you! 🙏
          stale-issue-label: 'stale'
          exempt-issue-labels: 'pinned,security,critical,enhancement'
          days-before-issue-stale: 60
          days-before-issue-close: 7
          
          # Pull request settings
          stale-pr-message: |
            👋 Hey there! This pull request has been automatically marked as stale because it hasn't had any activity in the last 30 days.
            
            **What happens next?**
            - If this PR is still relevant and you're working on it, please comment or push new commits.
            - Otherwise, it will be automatically closed in 7 days.
            
            Thank you for your contributions! 🙏
          close-pr-message: |
            🤖 This pull request has been automatically closed due to inactivity.
            
            If you'd like to continue working on this:
            1. Rebase your branch on the latest main
            2. Push new commits
            3. Reopen the PR
            
            Thank you! 🙏
          stale-pr-label: 'stale'
          exempt-pr-labels: 'pinned,security,work-in-progress,blocked'
          days-before-pr-stale: 30
          days-before-pr-close: 7
          
          # General settings
          operations-per-run: 100
          remove-stale-when-updated: true
          ascending: false
          exempt-all-milestones: true
          
          # Debug mode (set to true for troubleshooting)
          debug-only: false
      
      - name: Generate summary
        run: |
          echo "## 🧹 Stale Items Processed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The stale bot has completed its run." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Configuration" >> $GITHUB_STEP_SUMMARY
          echo "- **Issues**: Stale after 60 days, closed after 7 more days" >> $GITHUB_STEP_SUMMARY
          echo "- **PRs**: Stale after 30 days, closed after 7 more days" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Exempt Labels" >> $GITHUB_STEP_SUMMARY
          echo "- Issues: \`pinned\`, \`security\`, \`critical\`, \`enhancement\`" >> $GITHUB_STEP_SUMMARY
          echo "- PRs: \`pinned\`, \`security\`, \`work-in-progress\`, \`blocked\`" >> $GITHUB_STEP_SUMMARY
